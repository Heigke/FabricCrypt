<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#0b0d10" />
<title>Voice — gfx1151</title>
<style>
  :root {
    --bg: #0b0d10;
    --fg: #e6e6e6;
    --muted: #8a8f98;
    --accent: #5cc8ff;
    --user: #2b3138;
    --asst: #143247;
    --ok: #4ade80;
    --err: #f87171;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg); color: var(--fg);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    height: 100%; overflow: hidden;
  }
  #app {
    display: flex; flex-direction: column;
    height: 100vh; height: 100dvh;
    max-width: 720px; margin: 0 auto; padding: env(safe-area-inset-top) 12px env(safe-area-inset-bottom);
  }
  header {
    display: flex; align-items: center; gap: 10px;
    padding: 12px 4px; border-bottom: 1px solid #1b1f25;
  }
  #dot {
    width: 12px; height: 12px; border-radius: 50%;
    background: var(--muted); transition: background .2s, transform .2s;
  }
  #dot.connected { background: var(--ok); }
  #dot.error     { background: var(--err); }
  #dot.speaking  { background: var(--accent); transform: scale(1.6); box-shadow: 0 0 18px var(--accent); }
  h1 { font-size: 16px; margin: 0; font-weight: 600; }
  #status { margin-left: auto; font-size: 12px; color: var(--muted); }

  #transcript {
    flex: 1; overflow-y: auto;
    padding: 12px 4px; display: flex; flex-direction: column; gap: 8px;
  }
  .msg {
    padding: 10px 12px; border-radius: 12px; max-width: 88%;
    font-size: 15px; line-height: 1.35; white-space: pre-wrap; word-wrap: break-word;
  }
  .msg.user { background: var(--user); align-self: flex-end; border-bottom-right-radius: 4px; }
  .msg.asst { background: var(--asst); align-self: flex-start; border-bottom-left-radius: 4px; }
  .msg.sys  { color: var(--muted); font-size: 12px; align-self: center; text-align: center; }

  #controls { padding: 12px 4px 6px; display: flex; gap: 10px; }
  button {
    flex: 1; padding: 16px; border-radius: 14px; border: none;
    font-size: 16px; font-weight: 600; cursor: pointer;
    background: var(--accent); color: #001827;
    transition: opacity .15s, transform .05s;
  }
  button:active { transform: scale(0.98); }
  button.stop { background: #b34a4a; color: white; }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
</style>
</head>
<body>
<div id="app">
  <header>
    <div id="dot"></div>
    <h1>gfx1151 voice</h1>
    <div id="status">idle</div>
  </header>

  <div id="transcript"></div>

  <div id="controls">
    <button id="startBtn">Start Conversation</button>
    <button id="stopBtn" class="stop" disabled>Stop</button>
  </div>
</div>

<audio id="remoteAudio" autoplay playsinline></audio>

<script>
"use strict";

const startBtn = document.getElementById("startBtn");
const stopBtn  = document.getElementById("stopBtn");
const statusEl = document.getElementById("status");
const dotEl    = document.getElementById("dot");
const transcript = document.getElementById("transcript");
const remoteAudio = document.getElementById("remoteAudio");

let pc = null;
let dc = null;
let micStream = null;
let currentUserMsg = null;
let currentAsstMsg = null;

function setStatus(text, cls) {
  statusEl.textContent = text;
  dotEl.className = "";
  if (cls) dotEl.classList.add(cls);
}

function appendMsg(role, text) {
  const el = document.createElement("div");
  el.className = "msg " + role;
  el.textContent = text;
  transcript.appendChild(el);
  transcript.scrollTop = transcript.scrollHeight;
  return el;
}

function sysLog(t) { appendMsg("sys", t); }

async function start() {
  startBtn.disabled = true;
  setStatus("requesting mic…");
  try {
    micStream = await navigator.mediaDevices.getUserMedia({
      audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true },
      video: false,
    });
  } catch (e) {
    setStatus("mic denied", "error");
    sysLog("Microphone permission denied: " + e.message);
    startBtn.disabled = false;
    return;
  }

  setStatus("minting token…");
  let session;
  try {
    const r = await fetch("/session", { method: "POST" });
    if (!r.ok) throw new Error("HTTP " + r.status + ": " + (await r.text()));
    session = await r.json();
  } catch (e) {
    setStatus("token error", "error");
    sysLog("Failed to mint session: " + e.message);
    startBtn.disabled = false;
    return;
  }
  const ephemeralKey = session.client_secret?.value;
  const model = session.model || "gpt-4o-realtime-preview-2024-12-17";
  if (!ephemeralKey) {
    setStatus("no key", "error");
    sysLog("Server returned no client_secret.value");
    startBtn.disabled = false;
    return;
  }

  setStatus("connecting…");
  pc = new RTCPeerConnection();

  pc.ontrack = (ev) => { remoteAudio.srcObject = ev.streams[0]; };
  micStream.getTracks().forEach(t => pc.addTrack(t, micStream));

  dc = pc.createDataChannel("oai-events");
  dc.onopen = () => {
    setStatus("connected", "connected");
    stopBtn.disabled = false;
    sysLog("Connected. Start speaking.");
  };
  dc.onmessage = (ev) => {
    try { handleEvent(JSON.parse(ev.data)); } catch (e) { console.error(e); }
  };

  pc.onconnectionstatechange = () => {
    if (["failed","disconnected","closed"].includes(pc.connectionState)) {
      setStatus(pc.connectionState, "error");
    }
  };

  const offer = await pc.createOffer();
  await pc.setLocalDescription(offer);

  const sdpRes = await fetch(`https://api.openai.com/v1/realtime?model=${encodeURIComponent(model)}`, {
    method: "POST",
    body: offer.sdp,
    headers: {
      Authorization: `Bearer ${ephemeralKey}`,
      "Content-Type": "application/sdp",
    },
  });
  if (!sdpRes.ok) {
    setStatus("sdp error", "error");
    sysLog("SDP exchange failed: " + sdpRes.status + " " + (await sdpRes.text()));
    return;
  }
  const answer = { type: "answer", sdp: await sdpRes.text() };
  await pc.setRemoteDescription(answer);
}

function handleEvent(evt) {
  switch (evt.type) {
    case "session.created":
    case "session.updated":
      break;

    case "input_audio_buffer.speech_started":
      currentUserMsg = appendMsg("user", "…");
      break;
    case "conversation.item.input_audio_transcription.completed":
      if (currentUserMsg) { currentUserMsg.textContent = evt.transcript || ""; currentUserMsg = null; }
      else appendMsg("user", evt.transcript || "");
      break;

    case "response.created":
      currentAsstMsg = appendMsg("asst", "");
      setStatus("speaking", "speaking");
      break;
    case "response.audio_transcript.delta":
      if (currentAsstMsg) {
        currentAsstMsg.textContent += evt.delta || "";
        transcript.scrollTop = transcript.scrollHeight;
      }
      break;
    case "response.done":
      currentAsstMsg = null;
      setStatus("listening", "connected");
      break;

    case "error":
      sysLog("error: " + (evt.error?.message || JSON.stringify(evt)));
      setStatus("error", "error");
      break;
  }
}

function stop() {
  stopBtn.disabled = true;
  startBtn.disabled = false;
  try { if (dc) dc.close(); } catch (_) {}
  try { if (pc) pc.close(); } catch (_) {}
  if (micStream) micStream.getTracks().forEach(t => t.stop());
  pc = null; dc = null; micStream = null;
  setStatus("stopped");
  sysLog("Disconnected.");
}

startBtn.addEventListener("click", start);
stopBtn.addEventListener("click", stop);
window.addEventListener("beforeunload", stop);
</script>
</body>
</html>
